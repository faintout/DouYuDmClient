name: Test Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean old node_modules (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path "node_modules") {
            Write-Host "Removing node_modules..."
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue node_modules
          }
          if (Test-Path ".npmrc") {
            Remove-Item -Force -ErrorAction SilentlyContinue .npmrc
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        env:
          npm_config_loglevel: warn

      - name: Build for ${{ matrix.target }}
        run: npm run build:${{ matrix.target }}
        env:
          DEBUG: 'electron-builder'

      - name: Check build output
        shell: bash
        run: |
          echo "=== Build artifacts in dist/ ==="
          ls -lh dist/ || echo "dist/ not found"

          artifact_count=$(find dist -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.zip" -o -name "*.deb" \) 2>/dev/null | wc -l)
          if [ "$artifact_count" -eq 0 ]; then
            echo "❌ Build failed: No output files found"
            exit 1
          fi
          echo "✅ Build succeeded: Found $artifact_count artifact(s)"
