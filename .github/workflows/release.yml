name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: '*.AppImage'
            artifact_path: dist
          - os: windows-latest
            target: win
            artifact_name: '*.exe'
            artifact_path: dist
          - os: macos-latest
            target: mac
            artifact_name: '*.dmg'
            artifact_path: dist

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean old node_modules (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path "node_modules") {
            Write-Host "Removing node_modules..."
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue node_modules
          }
          if (Test-Path ".npmrc") {
            Remove-Item -Force -ErrorAction SilentlyContinue .npmrc
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        env:
          npm_config_loglevel: warn

      - name: Build for ${{ matrix.target }}
        run: npm run build:${{ matrix.target }}
        env:
          DEBUG: 'electron-builder'

      - name: List build artifacts
        shell: bash
        run: |
          echo "=== Build artifacts ==="
          find dist -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.zip" -o -name "*.deb" \) -ls

      - name: Cleanup before upload (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "Releasing file handles..."
          [GC]::Collect()
          [GC]::WaitForPendingFinalizers()
          Start-Sleep -Seconds 2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifacts
          path: dist/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find ./artifacts -type f -ls

      - name: Flatten artifacts directory
        run: |
          mkdir -p ./release-files
          find ./artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.zip" -o -name "*.deb" \) -exec mv {} ./release-files/ \;
          echo "=== Release files ==="
          ls -lh ./release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
